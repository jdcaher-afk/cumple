<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Para Elisabeth</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{min-height:100vh;background:#0d0d0d}
  #app{min-height:100vh;background:#0d0d0d;font-family:'Montserrat',sans-serif;color:#e8dcc8;overflow-x:hidden;max-width:480px;margin:0 auto}
  .screen{display:none;min-height:100vh;flex-direction:column;align-items:center;padding:2rem 1.4rem}
  .screen.active{display:flex}
  .gold-line{width:60px;height:1px;background:#c9a84c;margin:1rem auto}
  .gold-line-full{width:100%;height:1px;background:linear-gradient(to right,transparent,#c9a84c,transparent);margin:1.2rem 0}
  .blink{animation:pulse 2s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:0.4}50%{opacity:1}}
  .fade-in{animation:fadeIn 0.8s ease forwards}
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .hidden{display:none}

  /* SOBRE */
  .envelope-wrap{width:100%;max-width:320px;margin:2rem auto;cursor:pointer}
  .envelope-body{background:#1a1410;border:1px solid #c9a84c44;padding:2rem 1.5rem 1.5rem;position:relative;text-align:center}
  .envelope-body::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:0;height:0;border-left:160px solid transparent;border-right:160px solid transparent;border-top:90px solid #0d0d0d;transition:border-top-color 0.5s}
  .envelope-body.open::before{border-top-color:#1a1410}
  .wax-seal{width:52px;height:52px;border-radius:50%;background:#8B0000;border:2px solid #c9a84c;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:22px;color:#c9a84c;margin:0.5rem auto 1.5rem;position:relative;z-index:2;box-shadow:0 0 0 4px #1a1410;transition:transform 0.3s}
  .envelope-body:hover .wax-seal{transform:scale(1.08)}
  .env-label{font-size:10px;letter-spacing:3px;color:#c9a84c99;text-transform:uppercase;margin-bottom:0.5rem}
  .env-name{font-family:'Cormorant Garamond',serif;font-size:26px;font-style:italic;color:#e8dcc8;line-height:1.2}

  /* QUIZ */
  .quiz-header{text-align:center;margin-bottom:1.5rem;width:100%}
  .quiz-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-style:italic;color:#e8dcc8;margin-bottom:0.3rem}
  .quiz-sub{font-size:10px;letter-spacing:3px;color:#c9a84c;text-transform:uppercase}
  .progress-dots{display:flex;gap:8px;justify-content:center;margin:1rem 0}
  .dot{width:6px;height:6px;border-radius:50%;background:#c9a84c22;border:1px solid #c9a84c44;transition:all 0.4s}
  .dot.done{background:#c9a84c}
  .q-card{width:100%;background:#1a1410;border:1px solid #c9a84c33;padding:1.5rem;margin:0.5rem 0}
  .q-num{font-size:10px;letter-spacing:3px;color:#c9a84c88;margin-bottom:0.8rem;text-transform:uppercase}
  .q-text{font-family:'Cormorant Garamond',serif;font-size:20px;font-style:italic;color:#e8dcc8;line-height:1.5;margin-bottom:1.2rem}
  .opt{display:block;width:100%;background:transparent;border:1px solid #c9a84c22;color:#c9a84c88;font-family:'Montserrat',sans-serif;font-size:11px;padding:12px 16px;margin:6px 0;cursor:pointer;text-align:left;letter-spacing:1px;text-transform:uppercase;transition:all 0.2s;-webkit-tap-highlight-color:transparent}
  .opt:active,.opt:hover{border-color:#c9a84c66;color:#e8dcc8}
  .opt.correct{border-color:#c9a84c;background:#c9a84c11;color:#c9a84c}
  .opt.wrong{border-color:#8B000066;background:#8B000011;color:#8B000099}
  .feedback{font-size:11px;letter-spacing:2px;min-height:20px;margin-top:8px;text-align:center}

  /* PISTA */
  .clue-card{width:100%;background:#1a1410;border:1px solid #c9a84c44;padding:2rem 1.5rem;text-align:center;margin-top:1rem}
  .clue-icon{font-size:32px;margin-bottom:1rem}
  .clue-label{font-size:9px;letter-spacing:4px;color:#c9a84c;text-transform:uppercase;margin-bottom:1rem}
  .clue-coords{font-family:'Cormorant Garamond',serif;font-size:28px;color:#e8dcc8;letter-spacing:4px;margin:0.8rem 0}
  .clue-hint{font-family:'Cormorant Garamond',serif;font-size:16px;font-style:italic;color:#c9a84c88;line-height:1.6;margin:0.8rem 0 1.2rem}
  .maps-btn{display:block;width:100%;background:transparent;border:1px solid #c9a84c;color:#c9a84c;font-family:'Montserrat',sans-serif;font-size:11px;padding:14px 20px;cursor:pointer;letter-spacing:2px;text-transform:uppercase;text-decoration:none;text-align:center;margin-top:0.5rem;-webkit-tap-highlight-color:transparent}
  .maps-btn:active{background:#c9a84c11}
</style>
</head>
<body>
<div id="app">

  <!-- PANTALLA 1: SOBRE -->
  <div id="s1" class="screen active">
    <div style="flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;width:100%">
      <p style="font-size:9px;letter-spacing:4px;color:#c9a84c88;text-transform:uppercase;margin-bottom:2rem">Una sorpresa para</p>
      <div class="envelope-wrap" onclick="openEnvelope()">
        <div class="envelope-body" id="env">
          <div class="wax-seal">✦</div>
          <div class="env-label">Para</div>
          <div class="env-name">Elisabeth</div>
          <div class="gold-line"></div>
          <div style="font-size:10px;color:#c9a84c66;letter-spacing:1px">Con amor, Dani</div>
          <div class="blink" style="font-size:10px;color:#c9a84c55;letter-spacing:2px;margin-top:1.5rem">✦ toca para abrir ✦</div>
        </div>
      </div>
    </div>
  </div>

  <!-- PANTALLA 2: QUIZ -->
  <div id="s2" class="screen">
    <div class="quiz-header">
      <div class="gold-line"></div>
      <div class="quiz-title">¿Nos conocemos?</div>
      <div class="quiz-sub">Tres preguntas para ti</div>
      <div class="gold-line"></div>
      <div class="progress-dots">
        <div class="dot" id="d0"></div>
        <div class="dot" id="d1"></div>
        <div class="dot" id="d2"></div>
      </div>
    </div>
    <div id="qcontent" style="width:100%"></div>
  </div>

  <!-- PANTALLA 3: PISTA -->
  <div id="s3" class="screen">
    <div style="width:100%;text-align:center;margin-bottom:0.5rem">
      <div class="gold-line"></div>
      <div style="font-family:'Cormorant Garamond',serif;font-size:13px;letter-spacing:4px;color:#c9a84c;text-transform:uppercase">Misión superada</div>
      <div class="gold-line"></div>
    </div>

    <div class="clue-card fade-in">
      <div class="clue-label">Ahora busca el siguiente QR</div>
      <div class="gold-line-full"></div>

      <!-- ════════════════════════════════════
           CAMBIA AQUÍ LAS COORDENADAS
           Formato: GG°MM'SS.S"N GG°MM'SS.S"W
           ════════════════════════════════════ -->
      <div class="clue-coords" id="coords-display">28°27'46"N 16°15'16"W</div>

      <div class="gold-line-full"></div>

      <!-- ════════════════════════════════════
           CAMBIA AQUÍ EL TEXTO DE LA PISTA
           ════════════════════════════════════ -->
      <div class="clue-hint">"Donde los dos nos perdemos<br>entre páginas y café"</div>

      <!-- ════════════════════════════════════
           CAMBIA AQUÍ LAS COORDENADAS DEL ENLACE
           Formato: latitud,longitud decimales
           Ej: 28.4628,-16.2544
           ════════════════════════════════════ -->
      <a class="maps-btn" href="https://maps.apple.com/?ll=28.4628,-16.2544&q=Siguiente+QR" target="_blank">
        ✦ abrir en maps ✦
      </a>
    </div>

    <div style="font-size:10px;color:#c9a84c44;letter-spacing:2px;text-align:center;margin-top:1.5rem">
      El siguiente QR te espera ahí
    </div>
  </div>

</div>
<script>
const questions=[
  /* ════════════════════════════════════════════════
     CAMBIA AQUÍ LAS PREGUNTAS, OPCIONES Y correct:
     correct es el índice (0=A, 1=B, 2=C, 3=D)
     ════════════════════════════════════════════════ */
  {q:"¿Cuándo nos conocimos?", opts:["02/2024","02/2021","02/2023","01/2021"], correct:1},
  {q:"¿Cuál es tu color favorito?", opts:["Azul","Rosa","Morado","Negro"], correct:1},
  {q:"¿Qué marca es tu coche?", opts:["Renault","Volkswagen","Fiat","Nissan"], correct:3}
];

let cur=0, answered=false;

function openEnvelope(){
  document.getElementById('env').classList.add('open');
  setTimeout(()=>{
    document.getElementById('s1').classList.remove('active');
    document.getElementById('s2').classList.add('active');
    renderQ();
  },600);
}

function renderQ(){
  const q=questions[cur];
  answered=false;
  for(let i=0;i<3;i++) document.getElementById('d'+i).classList.toggle('done',i<cur);
  document.getElementById('qcontent').innerHTML=`
    <div class="q-card fade-in">
      <div class="q-num">Pregunta ${cur+1} de ${questions.length}</div>
      <div class="q-text">${q.q}</div>
      ${q.opts.map((o,i)=>`<button class="opt" onclick="pick(${i})">${o}</button>`).join('')}
      <div class="feedback" id="fb"></div>
    </div>`;
}

function pick(idx){
  if(answered)return;
  answered=true;
  const q=questions[cur];
  const btns=document.querySelectorAll('.opt');
  if(idx===q.correct){
    btns[idx].classList.add('correct');
    document.getElementById('fb').innerHTML='<span style="color:#c9a84c;letter-spacing:2px">✦ correcto</span>';
    setTimeout(()=>{cur++;cur<questions.length?renderQ():showClue();},900);
  } else {
    btns[idx].classList.add('wrong');
    btns[q.correct].classList.add('correct');
    document.getElementById('fb').innerHTML='<span style="color:#8B000099;letter-spacing:2px">— así es</span>';
    setTimeout(()=>{cur++;cur<questions.length?renderQ():showClue();},1500);
  }
}

function showClue(){
  document.getElementById('s2').classList.remove('active');
  document.getElementById('s3').classList.add('active');
}
</script>
</body>
</html>
